<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening KavachVerify...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            color: #1a1a1a;
            padding: 24px;
        }

        .container {
            max-width: 380px;
            width: 100%;
        }

        .icon {
            width: 56px;
            height: 56px;
            background-color: #1a1a1a;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .icon svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: #888;
            margin-bottom: 32px;
        }

        .loader {
            border: 2.5px solid #e5e5e5;
            border-top: 2.5px solid #1a1a1a;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 32px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 500;
            font-size: 15px;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: opacity 0.15s ease;
            border: none;
        }

        .btn:hover { opacity: 0.85; }
        .btn:active { opacity: 0.7; transform: scale(0.985); }

        .divider {
            height: 1px;
            background-color: #e5e5e5;
            margin: 24px 0;
        }

        .fallback {
            display: none;
        }

        .fallback p {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }

        .footer {
            margin-top: 48px;
            font-size: 12px;
            color: #bbb;
            letter-spacing: -0.1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-3.13 9.06-7 10.2-3.87-1.14-7-5.53-7-10.2V6.3l7-3.12z"/>
                <path d="M10 15.5l-3.5-3.5 1.41-1.41L10 12.67l5.59-5.59L17 8.5l-7 7z"/>
            </svg>
        </div>

        <h2>Redirecting to KavachVerify</h2>
        <p class="subtitle">Opening the app on your device</p>

        <div class="loader" id="loader"></div>

        <a id="openBtn" class="btn">Open App</a>

        <div class="fallback" id="fallback">
            <div class="divider"></div>
            <p>The app didn't open. Make sure KavachVerify is installed on your device, then tap the button above to try again.</p>
        </div>
    </div>

    <div class="footer">KavachVerify &middot; Secure Reporting</div>

    <script>
        (function() {
            var CUSTOM_SCHEME_URL = 'kavach://report';
            var INTENT_URL = 'intent://report#Intent;scheme=kavach;package=com.kavachverify.kavach_verify;end';

            var isAndroid = /android/i.test(navigator.userAgent);
            var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            var isChrome = /chrome/i.test(navigator.userAgent) && !/edge|edg/i.test(navigator.userAgent);

            var openBtn = document.getElementById('openBtn');
            var fallback = document.getElementById('fallback');
            var loader = document.getElementById('loader');

            function getDeepLink() {
                if (isAndroid && isChrome) return INTENT_URL;
                return CUSTOM_SCHEME_URL;
            }

            function showFallback() {
                loader.style.display = 'none';
                fallback.style.display = 'block';
            }

            openBtn.href = getDeepLink();

            function tryAutoOpen() {
                var deepLink = getDeepLink();

                if (isAndroid && isChrome) {
                    window.location.href = deepLink;
                } else if (isIOS) {
                    window.location.href = CUSTOM_SCHEME_URL;
                    setTimeout(function() {
                        if (!document.hidden) showFallback();
                    }, 2500);
                } else {
                    var iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = CUSTOM_SCHEME_URL;
                    document.body.appendChild(iframe);
                    setTimeout(function() {
                        document.body.removeChild(iframe);
                        if (!document.hidden) showFallback();
                    }, 2500);
                }
            }

            setTimeout(tryAutoOpen, 400);

            openBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = getDeepLink();
                setTimeout(function() {
                    if (!document.hidden) showFallback();
                }, 2500);
            });
        })();
    </script>
</body>
</html>
