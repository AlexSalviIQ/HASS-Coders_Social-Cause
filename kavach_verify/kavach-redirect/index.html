<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening KavachVerify...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #001a33 0%, #003366 50%, #004d99 100%);
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 24px;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 16px 36px;
            background-color: #ffffff;
            color: #003366;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 17px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 16px;
        }
        .btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .fallback {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .fallback p {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            line-height: 1.5;
        }
        .store-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #00cc66;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            margin-top: 12px;
            box-shadow: 0 4px 10px rgba(0,204,102,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Opening KavachVerify...</h2>
        <p class="subtitle">Please wait while we redirect you to the app</p>
        <div class="loader" id="loader"></div>

        <a id="openBtn" class="btn">Open KavachVerify App</a>

        <div class="fallback" id="fallback">
            <p>It looks like the KavachVerify app isn't installed on this device, or this link was opened on a desktop browser.</p>
            <p style="margin-top: 8px;">Please install the app and try again.</p>
            <!-- Uncomment and add your Play Store link when available:
            <a href="https://play.google.com/store/apps/details?id=com.kavachverify.kavach_verify" class="store-btn">
                Get it on Google Play
            </a>
            -->
        </div>
    </div>

    <script>
        (function() {
            var CUSTOM_SCHEME_URL = 'kavach://report';

            // Android Chrome needs an intent:// URL for reliable deep linking
            var INTENT_URL = 'intent://report#Intent;scheme=kavach;package=com.kavachverify.kavach_verify;end';

            var isAndroid = /android/i.test(navigator.userAgent);
            var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            var isChrome = /chrome/i.test(navigator.userAgent) && !/edge|edg/i.test(navigator.userAgent);

            var openBtn = document.getElementById('openBtn');
            var fallback = document.getElementById('fallback');
            var loader = document.getElementById('loader');

            function getDeepLink() {
                if (isAndroid && isChrome) {
                    return INTENT_URL;
                }
                return CUSTOM_SCHEME_URL;
            }

            function showFallback() {
                loader.style.display = 'none';
                fallback.style.display = 'block';
            }

            // Set the button href
            openBtn.href = getDeepLink();

            // Try to open automatically using an iframe trick (works on many mobile browsers)
            function tryAutoOpen() {
                var deepLink = getDeepLink();

                if (isAndroid && isChrome) {
                    // For Android Chrome, redirect directly — intent:// handles fallback
                    window.location.href = deepLink;
                } else if (isIOS) {
                    // iOS: try custom scheme, fallback after timeout
                    window.location.href = CUSTOM_SCHEME_URL;
                    setTimeout(function() {
                        // If we're still here after 2.5s, the app didn't open
                        if (!document.hidden) {
                            showFallback();
                        }
                    }, 2500);
                } else {
                    // Desktop or other: try iframe approach
                    var iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = CUSTOM_SCHEME_URL;
                    document.body.appendChild(iframe);

                    setTimeout(function() {
                        document.body.removeChild(iframe);
                        if (!document.hidden) {
                            showFallback();
                        }
                    }, 2500);
                }
            }

            // Auto-attempt after a small delay
            setTimeout(tryAutoOpen, 500);

            // Manual button click
            openBtn.addEventListener('click', function(e) {
                e.preventDefault();
                var deepLink = getDeepLink();
                window.location.href = deepLink;

                setTimeout(function() {
                    if (!document.hidden) {
                        showFallback();
                    }
                }, 2500);
            });
        })();
    </script>
</body>
</html>
