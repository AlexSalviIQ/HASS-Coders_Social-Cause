publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  device_preview: ^1.2.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  provider: ^6.1.2
  http: ^1.3.0
  url_launcher: ^6.3.1
  record: ^5.1.2
  audioplayers: ^6.1.0
  open_filex: ^4.6.0
  path_provider: ^2.1.5

dependency_overrides:
  record_platform_interface: "1.3.0"
  record_linux: "1.3.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
